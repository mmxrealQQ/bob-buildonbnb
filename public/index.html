<html lang="en">
<head>

    .hd{border-bottom:1px solid var(--b);padding:8px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:rgba(10,10,10,.95);backdrop-filter:blur(10px);z-index:100}
    .logo{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;white-space:nowrap}
    .logo img{width:24px;height:24px;border-radius:50%}
    .badge{background:var(--yd);color:var(--y);padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;border:1px solid rgba(240,185,11,.2)}
    .search{flex:1;max-width:300px;margin-left:auto}
    .search input{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:6px 10px;color:var(--t);font-size:12px;outline:none}
    .search input:focus{border-color:var(--y)}
    .search input::placeholder{color:var(--t3)}

    .tabs{display:flex;border-bottom:1px solid var(--b);overflow-x:auto;position:sticky;top:41px;background:var(--bg);z-index:99}
    .tab{padding:8px 14px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;transition:.15s}
    .tab:hover{color:var(--t)}.tab.on{color:var(--y);border-bottom-color:var(--y)}
    .tab .cnt{background:var(--s2);padding:1px 5px;border-radius:8px;font-size:9px;margin-left:4px}

    .main{display:flex;height:calc(100vh - 82px)}
    .side{width:220px;border-right:1px solid var(--b);overflow-y:auto;flex-shrink:0}
    .cat{padding:8px 12px 4px;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
    .item{display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;cursor:pointer;color:var(--t2);border:none;background:none;width:100%;text-align:left;transition:.1s}
    .item:hover{background:var(--s2);color:var(--t)}.item.on{background:var(--yd);color:var(--y)}
    .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .dot.live{background:var(--g)}.dot.sim{background:var(--t3)}

    .panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .phead{padding:14px 16px;border-bottom:1px solid var(--b)}
    .pname{font-size:15px;font-weight:700;margin-bottom:2px}
    .pdesc{font-size:11px;color:var(--t2)}
    .psrc{font-size:9px;color:var(--t3);margin-top:4px}
    .psrc a{color:var(--t3)}
    .pform{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;flex-wrap:wrap;gap:8px;align-items:end}
    .prow{display:flex;flex-direction:column;gap:3px}
    .prow label{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
    .prow input{background:var(--s2);border:1px solid var(--b);border-radius:6px;padding:7px 10px;color:var(--t);font-size:12px;font-family:'SF Mono',Monaco,'Cascadia Code',monospace;outline:none;min-width:180px}
    .prow input:focus{border-color:var(--y)}
    .run{padding:7px 18px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer;background:var(--y);color:#000;transition:.15s;white-space:nowrap;align-self:end}
    .run:hover{opacity:.9}
    .sim-badge{display:inline-block;background:rgba(136,136,136,.15);color:var(--t2);padding:2px 8px;border-radius:4px;font-size:10px;margin-left:8px}
    .live-badge{display:inline-block;background:rgba(14,203,129,.15);color:var(--g);padding:2px 8px;border-radius:4px;font-size:10px;margin-left:8px}

    .out{flex:1;overflow-y:auto;padding:12px 16px}
    .out pre{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-all}
    .out .ok{color:var(--g)}.out .err{color:var(--r)}.out .inf{color:var(--t2)}.out .sim{color:var(--y)}

    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal{background:var(--s);border:1px solid var(--b);border-radius:14px;max-width:480px;width:90%;padding:28px;animation:modalIn .25s ease}
    @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    .modal h2{font-size:18px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
    .modal h2 img{width:28px;height:28px;border-radius:50%}
    .modal p{font-size:12px;color:var(--t2);margin:8px 0;line-height:1.7}
    .modal ul{font-size:12px;color:var(--t2);margin:8px 0 12px 16px;line-height:1.8}
    .modal ul li::marker{color:var(--y)}
    .modal .mbtn{display:block;width:100%;padding:10px;background:var(--y);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:16px;transition:.15s}
    .modal .mbtn:hover{opacity:.9}
    .modal .mfoot{font-size:10px;color:var(--t3);text-align:center;margin-top:10px}

    @media(max-width:768px){
      .main{flex-direction:column;height:auto}
      .side{width:100%;max-height:200px;border-right:none;border-bottom:1px solid var(--b)}
      .search{max-width:160px}
      .badge{display:none}
      .prow input{min-width:120px}
    }
  </style>
</head>

<div class="hd">

let curTab="bnb",curTool=null;

function renderTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(t=>{
    const c=t.id==="a2a"?"":T.filter(x=>x.tab===t.id).length;
    return `<button class="tab${curTab===t.id?" on":""}" onclick="switchTab('${t.id}')">${t.label}${c?`<span class="cnt">${c}</span>`:""}</button>`;
  }).join("");
}

function renderSidebar(){
  if(curTab==="a2a"){renderA2ASide();return}
  const q=document.getElementById("q").value.toLowerCase();
  const tools=T.filter(t=>t.tab===curTab&&(!q||t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)));
  let h="",lc="";
  tools.forEach(t=>{if(t.cat!==lc){h+=`<div class="cat">${t.cat}</div>`;lc=t.cat}
    h+=`<button class="item${curTool===t.id?" on":""}" onclick="sel('${t.id}')"><span class="dot ${t.mode}"></span>${t.name}</button>`;
  });
  document.getElementById("side").innerHTML=h||'<div style="padding:16px;font-size:11px;color:var(--t3)">No matches.</div>';
}

function renderPanel(){
  const t=T.find(x=>x.id===curTool);if(!t)return;
  document.getElementById("pname").innerHTML=t.name+(t.mode==="live"?'<span class="live-badge">LIVE</span>':'<span class="sim-badge">SIMULATION</span>');
  document.getElementById("pdesc").textContent=t.desc;
  const repo=t.src==="bnbchain-mcp"?"bnb-chain/bnbchain-mcp":t.src==="binance-mcp"?"TermiX-official/binance-mcp":t.src==="bsc-mcp"?"TermiX-official/bsc-mcp":"heurist-network/heurist-mesh-mcp-server";
  document.getElementById("psrc").innerHTML=`Source: <a href="https://github.com/${repo}" target="_blank">${t.src}</a>`;
  const pf=document.getElementById("pform");
  let h=t.params.map(p=>`<div class="prow"><label>${p.l}</label><input type="text" id="p-${p.k}" placeholder="${p.ph}" onkeydown="if(event.key==='Enter')exec()"></div>`).join("");
  h+=`<button class="run" onclick="exec()">${t.mode==="live"?"Run":"Simulate"}</button><button class="run" onclick="renderPanel()" style="background:var(--s2);color:var(--t2);border:1px solid var(--b);padding:7px 10px" title="Reset — show tool description">&#x21bb;</button>`;
  pf.innerHTML=h;pf.style.display="flex";
  document.getElementById("out").innerHTML=t.mode==="live"?`<pre class="inf">This tool calls a real API and returns live data.\n${t.params.length?"Fill in the fields above and click Run.":"No input needed — just click Run!"}</pre>`:`<pre class="inf">This tool requires a local MCP server or API key.\nClick Simulate to see what it does, what it costs, and what you need.</pre>`;
}

function switchTab(id){curTab=id;curTool=null;renderTabs();renderSidebar();
  if(id==="a2a"){renderA2APanel();return}
  document.getElementById("pname").textContent="Select a tool";
  document.getElementById("pdesc").textContent="Pick a tool from the "+TABS.find(t=>t.id===id).label+" category.";
  document.getElementById("psrc").innerHTML="";
  document.getElementById("pform").style.display="none";
  document.getElementById("out").innerHTML='<pre class="inf">Pick a tool from the sidebar.</pre>';
}
function sel(id){curTool=id;renderSidebar();renderPanel()}
function filter(){renderSidebar()}
function gv(k){const el=document.getElementById("p-"+k);return el?el.value.trim():""}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// API
async function rpc(m,p=[]){const r=await fetch("/api/rpc",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({method:m,params:p})});return r.json()}
async function proxy(url){const r=await fetch("/api/proxy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url})});return r.json()}
async function binance(path){return proxy("https://data-api.binance.vision"+path)}
async function fbin(path){return proxy("https://fapi.binance.com"+path).then(d=>{if(d.code===0)return proxy("https://fapi.binance.vision"+path);return d})}

function out(h){document.getElementById("out").innerHTML=h}
function pre(t,c="ok"){out(`<pre class="${c}">${esc(typeof t==="object"?JSON.stringify(t,null,2):String(t))}</pre>`)}
function hexN(h){return parseInt(h,16)}
function wei(w){return(parseInt(w,16)/1e18).toFixed(6)}
function gwei(h){return(parseInt(h,16)/1e9).toFixed(2)}
function decStr(h){try{const hex=h.slice(130);const len=parseInt(hex.slice(0,64),16);let s="";for(let i=0;i<len;i++)s+=String.fromCharCode(parseInt(hex.slice(64+i*2,66+i*2),16));return s}catch{return"?"}}

function simOut(t){
  const s=t.sim;
  const repo=t.src==="bnbchain-mcp"?"bnb-chain/bnbchain-mcp":t.src==="binance-mcp"?"TermiX-official/binance-mcp":t.src==="bsc-mcp"?"TermiX-official/bsc-mcp":"heurist-network/heurist-mesh-mcp-server";
  out(`<pre class="sim">SIMULATION — What this tool would do in production\n${"─".repeat(50)}\n\n  Tool:         ${esc(t.name)}\n  MCP Server:   ${esc(t.src)}\n\n  What it does:\n  ${esc(s.does)}\n\n  Cost:         ${esc(s.cost)}\n  You need:     ${esc(s.needs)}\n${t.params.length?"\n  Your inputs:\n"+t.params.map(p=>"    "+p.l+": "+(gv(p.k)||"(not provided)")).join("\n")+"\n":""}\n${"─".repeat(50)}\n\n  How to use it for real:\n  1. Clone the MCP server: github.com/${repo}\n  2. Install dependencies and add your API keys\n  3. Connect it to your AI assistant (Claude, etc.)\n  4. The tool will then work with live data!</pre>`);
}

// EXEC
async function exec(){
  const t=T.find(x=>x.id===curTool);if(!t)return;
  if(t.mode==="sim"){simOut(t);return}
  out('<pre class="inf">Loading...</pre>');
  try{switch(t.id){
    case "latest-block":{const d=await rpc("eth_getBlockByNumber",["latest",false]);const b=d.result;pre(`Block: ${hexN(b.number)}\nHash: ${b.hash}\nTime: ${new Date(hexN(b.timestamp)*1000).toISOString()}\nTXs: ${b.transactions.length}\nGas: ${hexN(b.gasUsed)}\nMiner: ${b.miner}`);break}
    case "block-by-num":{const n=gv("num");if(!n){pre("Enter block number","err");break}const d=await rpc("eth_getBlockByNumber",["0x"+parseInt(n).toString(16),false]);if(!d.result){pre("Not found","err");break}const b=d.result;pre(`Block: ${hexN(b.number)}\nHash: ${b.hash}\nTime: ${new Date(hexN(b.timestamp)*1000).toISOString()}\nTXs: ${b.transactions.length}`);break}
    case "block-by-hash":{const h=gv("hash");if(!h){pre("Enter hash","err");break}const d=await rpc("eth_getBlockByHash",[h,false]);if(!d.result){pre("Not found","err");break}const b=d.result;pre(`Block: ${hexN(b.number)}\nHash: ${b.hash}\nTXs: ${b.transactions.length}`);break}
    case "get-tx":{const h=gv("hash");if(!h){pre("Enter TX hash","err");break}const d=await rpc("eth_getTransactionByHash",[h]);if(!d.result){pre("Not found","err");break}const x=d.result;pre(`Hash: ${x.hash}\nFrom: ${x.from}\nTo: ${x.to}\nValue: ${wei(x.value)} BNB\nGas: ${gwei(x.gasPrice)} Gwei\nBlock: ${hexN(x.blockNumber)}`);break}
    case "tx-receipt":{const h=gv("hash");if(!h){pre("Enter TX hash","err");break}const d=await rpc("eth_getTransactionReceipt",[h]);if(!d.result){pre("Not found","err");break}const r=d.result;pre(`Status: ${r.status==="0x1"?"Success":"Failed"}\nBlock: ${hexN(r.blockNumber)}\nGas: ${hexN(r.gasUsed)}\nFrom: ${r.from}\nTo: ${r.to}\nLogs: ${r.logs.length}`);break}
    case "estimate-gas":{const to=gv("to");if(!to){pre("Enter address","err");break}const d=await rpc("eth_estimateGas",[{to,value:"0x0"}]);pre(`Gas: ${hexN(d.result)} units\n~${(hexN(d.result)*3/1e9).toFixed(6)} BNB`);break}
    case "erc20-info":{const a=gv("addr");if(!a){pre("Enter token address","err");break}const[n,s,dc,ts]=await Promise.all([rpc("eth_call",[{to:a,data:"0x06fdde03"},"latest"]),rpc("eth_call",[{to:a,data:"0x95d89b41"},"latest"]),rpc("eth_call",[{to:a,data:"0x313ce567"},"latest"]),rpc("eth_call",[{to:a,data:"0x18160ddd"},"latest"])]);const d=parseInt(dc.result,16);pre(`Name: ${decStr(n.result)}\nSymbol: ${decStr(s.result)}\nDecimals: ${d}\nSupply: ${(parseInt(ts.result,16)/Math.pow(10,d)).toLocaleString()}`);break}
    case "erc20-balance":{const tk=gv("token"),w=gv("wallet");if(!tk||!w){pre("Enter both","err");break}const pad=w.slice(2).toLowerCase().padStart(64,"0");const[b,dc]=await Promise.all([rpc("eth_call",[{to:tk,data:"0x70a08231000000000000000000000000"+pad},"latest"]),rpc("eth_call",[{to:tk,data:"0x313ce567"},"latest"])]);const d=parseInt(dc.result,16);pre(`Balance: ${(parseInt(b.result,16)/Math.pow(10,d)).toLocaleString()}`);break}
    case "native-balance":{const a=gv("addr");if(!a){pre("Enter address","err");break}const d=await rpc("eth_getBalance",[a,"latest"]);pre(`Balance: ${wei(d.result)} BNB`);break}
    case "nft-info":{const a=gv("addr"),id=gv("id");if(!a||!id){pre("Enter both","err");break}const ih=parseInt(id).toString(16).padStart(64,"0");const[n,s,u]=await Promise.all([rpc("eth_call",[{to:a,data:"0x06fdde03"},"latest"]),rpc("eth_call",[{to:a,data:"0x95d89b41"},"latest"]),rpc("eth_call",[{to:a,data:"0xc87b56dd"+ih},"latest"])]);pre(`Name: ${decStr(n.result)}\nSymbol: ${decStr(s.result)}\nURI: ${decStr(u.result)}`);break}
    case "nft-balance":{const a=gv("addr"),w=gv("wallet");if(!a||!w){pre("Enter both","err");break}const d=await rpc("eth_call",[{to:a,data:"0x70a08231000000000000000000000000"+w.slice(2).toLowerCase().padStart(64,"0")},"latest"]);pre(`Balance: ${parseInt(d.result,16)} NFTs`);break}
    case "erc1155-meta":{const a=gv("addr"),id=gv("id");if(!a||!id){pre("Enter both","err");break}const d=await rpc("eth_call",[{to:a,data:"0x0e89341c"+parseInt(id).toString(16).padStart(64,"0")},"latest"]);pre(`URI: ${decStr(d.result)}`);break}
    case "erc1155-bal":{const a=gv("addr"),id=gv("id"),w=gv("wallet");if(!a||!id||!w){pre("Enter all","err");break}const d=await rpc("eth_call",[{to:a,data:"0x00fdd58e000000000000000000000000"+w.slice(2).toLowerCase().padStart(64,"0")+parseInt(id).toString(16).padStart(64,"0")},"latest"]);pre(`Balance: ${parseInt(d.result,16)}`);break}
    case "is-contract":{const a=gv("addr");if(!a){pre("Enter address","err");break}const d=await rpc("eth_getCode",[a,"latest"]);pre(d.result&&d.result!=="0x"?`Yes — Smart Contract (${(d.result.length-2)/2} bytes)`:"No — EOA (wallet)");break}
    case "get-code":{const a=gv("addr");if(!a){pre("Enter address","err");break}const d=await rpc("eth_getCode",[a,"latest"]);if(!d.result||d.result==="0x"){pre("No code","err");break}pre(`Bytecode (${(d.result.length-2)/2} bytes):\n${d.result.slice(0,200)}...`);break}
    case "read-contract":{const a=gv("addr"),fn=gv("fn");if(!a||!fn){pre("Enter both","err");break}const k={"name()":"0x06fdde03","symbol()":"0x95d89b41","decimals()":"0x313ce567","totalSupply()":"0x18160ddd","owner()":"0x8da5cb5b"};const sel=k[fn];if(!sel){pre("Use: name(), symbol(), decimals(), totalSupply(), owner()","inf");break}const d=await rpc("eth_call",[{to:a,data:sel},"latest"]);if(fn==="decimals()"||fn==="totalSupply()")pre(`Result: ${parseInt(d.result,16)}`);else if(fn==="owner()")pre(`Result: 0x${d.result.slice(26)}`);else pre(`Result: ${decStr(d.result)}`);break}
    case "gas-price":{const d=await rpc("eth_gasPrice");pre(`Gas: ${gwei(d.result)} Gwei`);break}
    case "chain-info":{const d=await rpc("eth_chainId");pre(`Chain ID: ${parseInt(d.result,16)}\nNetwork: BNB Smart Chain\nCurrency: BNB`);break}
    case "nonce":{const a=gv("addr");if(!a){pre("Enter address","err");break}const d=await rpc("eth_getTransactionCount",[a,"latest"]);pre(`Nonce: ${parseInt(d.result,16)} transactions sent`);break}
    case "8004-agent":case "8004-wallet":{const id=gv("id");if(!id){pre("Enter agent ID","err");break}const r=await fetch("/api/agent/"+id);const d=await r.json();if(d.detail||d.error){pre("Not found","err");break}if(t.id==="8004-wallet")pre(`Agent #${d.token_id}: ${d.name||"?"}\nOwner: ${d.owner_address}`);else pre(`${d.name||"Agent #"+d.token_id}\nID: ${d.token_id}\nOwner: ${d.owner_address}\nScore: ${d.total_score?.toFixed(1)||"?"}/100\nHealth: ${d.health_status||"?"}\nProtocols: ${(d.supported_protocols||[]).join(", ")}\nA2A: ${d.a2a_endpoint||"none"}\nCreated: ${d.created_at}`);break}
    // BINANCE
    case "bn-ping":{await binance("/api/v3/ping");pre("Binance API OK");break}
    case "bn-time":{const d=await binance("/api/v3/time");pre(`Time: ${new Date(d.serverTime).toISOString()}`);break}
    case "bn-info":{const s=gv("sym");const d=await binance(s?`/api/v3/exchangeInfo?symbol=${s.toUpperCase()}`:"/api/v3/exchangeInfo");if(s&&d.symbols?.[0]){const i=d.symbols[0];pre(`${i.symbol} — ${i.status}\nBase: ${i.baseAsset}\nQuote: ${i.quoteAsset}`)}else pre(`Symbols: ${d.symbols?.length||"?"}`);break}
    case "bn-price":{const s=gv("sym");if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/ticker/price?symbol=${s.toUpperCase()}`);pre(`${d.symbol}: $${parseFloat(d.price).toLocaleString()}`);break}
    case "bn-24h":{const s=gv("sym");if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/ticker/24hr?symbol=${s.toUpperCase()}`);pre(`${d.symbol} 24h\nPrice: $${parseFloat(d.lastPrice).toLocaleString()}\nChange: ${d.priceChangePercent}%\nHigh: $${parseFloat(d.highPrice).toLocaleString()}\nLow: $${parseFloat(d.lowPrice).toLocaleString()}\nVolume: ${parseFloat(d.volume).toLocaleString()}\nTrades: ${d.count?.toLocaleString()}`);break}
    case "bn-book-ticker":{const s=gv("sym");if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/ticker/bookTicker?symbol=${s.toUpperCase()}`);pre(`${d.symbol}\nBid: $${d.bidPrice} (${d.bidQty})\nAsk: $${d.askPrice} (${d.askQty})\nSpread: $${(parseFloat(d.askPrice)-parseFloat(d.bidPrice)).toFixed(4)}`);break}
    case "bn-avg":{const s=gv("sym");if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/avgPrice?symbol=${s.toUpperCase()}`);pre(`${s.toUpperCase()} Avg (${d.mins}m): $${parseFloat(d.price).toLocaleString()}`);break}
    case "bn-day":{const s=gv("sym");if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/ticker/tradingDay?symbol=${s.toUpperCase()}`);pre(`${d.symbol}\nPrice: $${parseFloat(d.lastPrice).toLocaleString()}\nChange: ${d.priceChangePercent}%\nVolume: ${parseFloat(d.volume).toLocaleString()}`);break}
    case "bn-depth":{const s=gv("sym"),l=gv("lim")||"5";if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/depth?symbol=${s.toUpperCase()}&limit=${l}`);let o=`${s.toUpperCase()} Order Book\n\nAsks:\n`;(d.asks||[]).slice(0,5).reverse().forEach(a=>o+=`  $${parseFloat(a[0]).toLocaleString()} — ${a[1]}\n`);o+=`\nBids:\n`;(d.bids||[]).slice(0,5).forEach(b=>o+=`  $${parseFloat(b[0]).toLocaleString()} — ${b[1]}\n`);pre(o);break}
    case "bn-trades":{const s=gv("sym"),l=gv("lim")||"5";if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/trades?symbol=${s.toUpperCase()}&limit=${l}`);let o=`${s.toUpperCase()} Trades\n\n`;(d||[]).forEach(t=>o+=`${t.isBuyerMaker?"SELL":"BUY "} $${parseFloat(t.price).toLocaleString()} qty:${t.qty} ${new Date(t.time).toLocaleTimeString()}\n`);pre(o);break}
    case "bn-agg":{const s=gv("sym"),l=gv("lim")||"5";if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/aggTrades?symbol=${s.toUpperCase()}&limit=${l}`);let o=`${s.toUpperCase()} Agg Trades\n\n`;(d||[]).forEach(t=>o+=`$${parseFloat(t.p).toLocaleString()} qty:${t.q} ${t.m?"SELL":"BUY "}\n`);pre(o);break}
    case "bn-klines":{const s=gv("sym"),i=gv("int")||"1h",l=gv("lim")||"5";if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/klines?symbol=${s.toUpperCase()}&interval=${i}&limit=${l}`);let o=`${s.toUpperCase()} ${i}\n\nTime             Open       High       Low        Close      Vol\n`;(d||[]).forEach(k=>o+=`${new Date(k[0]).toISOString().slice(0,16)} $${(+k[1]).toFixed(2).padStart(9)} $${(+k[2]).toFixed(2).padStart(9)} $${(+k[3]).toFixed(2).padStart(9)} $${(+k[4]).toFixed(2).padStart(9)} ${(+k[5]).toFixed(0).padStart(9)}\n`);pre(o);break}
    case "bn-uiklines":{const s=gv("sym"),i=gv("int")||"1h",l=gv("lim")||"5";if(!s){pre("Enter symbol","err");break}const d=await binance(`/api/v3/uiKlines?symbol=${s.toUpperCase()}&interval=${i}&limit=${l}`);let o=`${s.toUpperCase()} UI Klines\n\n`;(d||[]).forEach(k=>o+=`${new Date(k[0]).toISOString().slice(0,16)} O:$${(+k[1]).toFixed(2)} C:$${(+k[4]).toFixed(2)}\n`);pre(o);break}
    case "bn-funding":{const d=await fbin("/fapi/v1/premiumIndex");let o="Funding Rates\n\n";(d||[]).slice(0,20).forEach(f=>o+=`${f.symbol.padEnd(12)} ${(parseFloat(f.lastFundingRate)*100).toFixed(4)}% Mark:$${(+f.markPrice).toFixed(2)}\n`);o+=`\n${(d||[]).length} total`;pre(o);break}
    case "bn-funding-sym":{const s=gv("sym");if(!s){pre("Enter symbol","err");break}const[f,oi]=await Promise.all([fbin(`/fapi/v1/premiumIndex?symbol=${s.toUpperCase()}`),fbin(`/fapi/v1/openInterest?symbol=${s.toUpperCase()}`)]);const v=Array.isArray(f)?f[0]:f;pre(`${v.symbol}\nMark: $${(+v.markPrice).toLocaleString()}\nIndex: $${(+v.indexPrice).toLocaleString()}\nFunding: ${(parseFloat(v.lastFundingRate)*100).toFixed(4)}%\nNext: ${new Date(v.nextFundingTime).toISOString()}\nOI: ${(+oi.openInterest).toLocaleString()}`);break}
    // DEX
    case "bnb-price":{const d=await proxy("https://api.coingecko.com/api/v3/simple/price?ids=binancecoin&vs_currencies=usd,eur,btc&include_24hr_change=true");const b=d.binancecoin;pre(`BNB\nUSD: $${b.usd.toLocaleString()}\nEUR: €${b.eur.toLocaleString()}\nBTC: ${b.btc}\n24h: ${b.usd_24h_change?.toFixed(2)}%`);break}
    case "token-search":{const q=gv("q");if(!q){pre("Enter query","err");break}if(q.startsWith("0x")){const d=await proxy(`https://api.dexscreener.com/latest/dex/tokens/${q}`);if(d.pairs?.[0]){const p=d.pairs[0];pre(`${p.baseToken.name} (${p.baseToken.symbol})\nPrice: $${p.priceUsd}\nLiq: $${parseInt(p.liquidity?.usd||0).toLocaleString()}\nVol: $${parseInt(p.volume?.h24||0).toLocaleString()}`)}else pre("Not found","err")}else{const d=await proxy(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(q)}`);let o=`"${q}"\n\n`;(d.coins||[]).slice(0,10).forEach(c=>o+=`${c.name} (${c.symbol.toUpperCase()}) #${c.market_cap_rank||"?"}\n`);pre(o)}break}
    case "token-profile":{const a=gv("addr");if(!a){pre("Enter address","err");break}const d=await proxy(`https://api.dexscreener.com/latest/dex/tokens/${a}`);if(!d.pairs?.[0]){pre("Not found","err");break}const p=d.pairs[0];pre(`${p.baseToken.name} (${p.baseToken.symbol})\nPrice: $${p.priceUsd}\n24h: ${p.priceChange?.h24||"?"}%\nLiq: $${parseInt(p.liquidity?.usd||0).toLocaleString()}\nVol: $${parseInt(p.volume?.h24||0).toLocaleString()}\nFDV: $${parseInt(p.fdv||0).toLocaleString()}\nDEX: ${p.dexId} (${p.chainId})`);break}
    case "trending":{const d=await proxy("https://api.dexscreener.com/token-boosts/top/v1");let o="Trending\n\n";const bsc=(d||[]).filter(t=>t.chainId==="bsc");const list=bsc.length?bsc:(d||[]);list.slice(0,15).forEach(t=>o+=`${(t.description||t.tokenAddress?.slice(0,10)||"?").slice(0,30)} — ${t.chainId}\n`);pre(o);break}
    case "dex-search":{const q=gv("q");if(!q){pre("Enter query","err");break}const d=await proxy(`https://api.dexscreener.com/latest/dex/search?q=${encodeURIComponent(q)}`);let o=`"${q}"\n\n`;(d.pairs||[]).slice(0,10).forEach(p=>o+=`${p.baseToken.symbol}/${p.quoteToken.symbol} $${p.priceUsd||"?"} Vol:$${parseInt(p.volume?.h24||0).toLocaleString()} ${p.dexId}\n`);pre(o);break}
    case "dex-pair":{const a=gv("addr");if(!a){pre("Enter pair","err");break}const d=await proxy(`https://api.dexscreener.com/latest/dex/pairs/bsc/${a}`);if(!d.pairs?.[0]){pre("Not found","err");break}const p=d.pairs[0];pre(`${p.baseToken.symbol}/${p.quoteToken.symbol}\nPrice: $${p.priceUsd}\nLiq: $${parseInt(p.liquidity?.usd||0).toLocaleString()}\nVol: $${parseInt(p.volume?.h24||0).toLocaleString()}\nDEX: ${p.dexId}`);break}
    case "new-pairs":{const d=await proxy("https://api.geckoterminal.com/api/v2/networks/bsc/new_pools?page=1");let o="New BSC Pairs\n\n";(d.data||[]).slice(0,10).forEach(p=>o+=`${p.attributes.name} Vol:$${parseInt(p.attributes.volume_usd?.h24||0).toLocaleString()}\n`);pre(o);break}
    case "top-pools":{const d=await proxy("https://api.geckoterminal.com/api/v2/networks/bsc/trending_pools");let o="Top BSC Pools\n\n";(d.data||[]).slice(0,10).forEach(p=>o+=`${p.attributes.name} Vol:$${parseInt(p.attributes.volume_usd?.h24||0).toLocaleString()}\n`);pre(o);break}
    case "ohlcv":{const a=gv("addr");if(!a){pre("Enter pool","err");break}const d=await proxy(`https://api.geckoterminal.com/api/v2/networks/bsc/pools/${a}/ohlcv/hour?limit=10`);const l=d.data?.attributes?.ohlcv_list||[];let o="OHLCV\n\nTime             O          H          L          C\n";l.forEach(c=>o+=`${new Date(c[0]*1000).toISOString().slice(0,16)} $${(+c[1]).toFixed(4).padStart(9)} $${(+c[2]).toFixed(4).padStart(9)} $${(+c[3]).toFixed(4).padStart(9)} $${(+c[4]).toFixed(4).padStart(9)}\n`);pre(o);break}
    case "heur-arb":{const d=await fbin("/fapi/v1/premiumIndex");let o="Spot-Futures Arb\n\n";const s=(d||[]).filter(f=>Math.abs(+f.lastFundingRate)>0.0005).sort((a,b)=>Math.abs(+b.lastFundingRate)-Math.abs(+a.lastFundingRate));s.slice(0,15).forEach(f=>o+=`${f.symbol.padEnd(12)} ${(+f.lastFundingRate*100).toFixed(4)}% Annual:${(+f.lastFundingRate*100*3*365).toFixed(1)}%\n`);o+="\n+ = short opp, - = long opp";pre(o);break}
    // SECURITY
    case "sec-token":{const a=gv("addr");if(!a){pre("Enter token","err");break}const d=await proxy(`https://api.gopluslabs.io/api/v1/token_security/56?contract_addresses=${a}`);const r=d.result?.[a.toLowerCase()];if(!r){pre("Not found","err");break}pre(`${r.token_name||"?"} (${r.token_symbol||"?"})\n\nHoneypot: ${r.is_honeypot==="1"?"YES":"No"}\nBuy Tax: ${r.buy_tax||"0"}%\nSell Tax: ${r.sell_tax||"0"}%\nOwner: ${r.owner_address||"renounced"}\nProxy: ${r.is_proxy==="1"?"YES":"No"}\nMintable: ${r.is_mintable==="1"?"YES":"No"}\nOpen Source: ${r.is_open_source==="1"?"Yes":"No"}\nHolders: ${r.holder_count||"?"}`);break}
    case "sec-approval":{const tk=gv("token"),ow=gv("owner");if(!tk||!ow){pre("Enter both","err");break}const d=await proxy(`https://api.gopluslabs.io/api/v1/approval_security/56?contract_addresses=${tk}`);pre(JSON.stringify(d.result||d,null,2));break}
    case "sec-nft":{const a=gv("addr");if(!a){pre("Enter NFT","err");break}const d=await proxy(`https://api.gopluslabs.io/api/v1/nft_security/56?contract_addresses=${a}`);const r=d.result?.[a.toLowerCase()];if(!r){pre("Not found","err");break}pre(`${r.nft_name||"?"}\nOpen Source: ${r.nft_open_source==="1"?"Yes":"No"}\nProxy: ${r.nft_proxy==="1"?"YES":"No"}\nSelf Destruct: ${r.self_destruct==="1"?"YES":"No"}`);break}
    case "sec-addr":{const a=gv("addr");if(!a){pre("Enter address","err");break}const d=await proxy(`https://api.gopluslabs.io/api/v1/address_security/${a}?chain_id=56`);const r=d.result;if(!r){pre("Not found","err");break}pre(`${a}\n\nMalicious: ${r.malicious_address==="1"?"YES":"No"}\nHoneypot: ${r.honeypot_related_address==="1"?"YES":"No"}\nPhishing: ${r.phishing_activities==="1"?"YES":"No"}\nDarkweb: ${r.darkweb_transactions==="1"?"YES":"No"}`);break}
    case "sec-phish":{const u=gv("url");if(!u){pre("Enter URL","err");break}const d=await proxy(`https://api.gopluslabs.io/api/v1/phishing_site?url=${encodeURIComponent(u)}`);pre(`${u}\n\nPhishing: ${d.result?.phishing_site==="1"?"YES — DANGEROUS":"No — Looks safe"}`);break}
    // 8004SCAN
    case "agent-detail":{const id=gv("id");if(!id){pre("Enter ID","err");break}const r=await fetch("/api/agent/"+id);const d=await r.json();if(d.detail||d.error){pre("Not found","err");break}pre(`${d.name||"#"+d.token_id}\nID: ${d.token_id}\nOwner: ${d.owner_address}\nScore: ${d.total_score?.toFixed(1)||"?"}/100\nHealth: ${d.health_status||"?"}\nProtocols: ${(d.supported_protocols||[]).join(", ")}\nA2A: ${d.a2a_endpoint||"none"}\nCreated: ${d.created_at}`);break}
    case "agent-search":{const q=gv("q");if(!q){pre("Enter query","err");break}const d=await proxy(`https://api.8004scan.io/api/v1/agents?chain_id=56&is_testnet=false&search=${encodeURIComponent(q)}&limit=10`);let o=`"${q}" (${d.total||0})\n\n`;(d.items||[]).forEach(a=>o+=`#${a.token_id} ${(a.name||"?").padEnd(25)} Score:${a.total_score?.toFixed(1)||"?"}\n`);pre(o);break}
    case "agent-list":{const d=await proxy("https://api.8004scan.io/api/v1/agents?chain_id=56&is_testnet=false&limit=15&sort_by=total_score&sort_order=desc");let o=`Top BSC Agents (${d.total||0})\n\n`;(d.items||[]).forEach(a=>o+=`#${a.token_id} ${(a.name||"?").padEnd(25)} ${(a.total_score?.toFixed(1)||"?").padStart(5)} ${(a.supported_protocols||[]).join(",")}\n`);pre(o);break}
    default:pre("Not implemented: "+t.id,"err")
  }}catch(e){pre("Error: "+e.message,"err")}
}

// A2A
function renderA2ASide(){
  document.getElementById("side").innerHTML=`<div class="cat">Your Agent</div><button class="item on" onclick="pickA2A('/api/a2a','BOB Build On BNB')"><span class="dot live"></span>BOB Build On BNB</button><div class="cat">A2A Info</div><div style="padding:8px 12px;font-size:10px;color:var(--t3);line-height:1.6">A2A (Agent-to-Agent) is Google's protocol for AI agents to communicate. Currently most BSC agents don't respond — the ecosystem is still early. BOB is fully A2A compatible and ready to chat!</div>`;
}
function renderA2APanel(){
  document.getElementById("pname").textContent="A2A Agent Communication";
  document.getElementById("pdesc").textContent="Send JSON-RPC messages to AI agents using Google's A2A protocol. BOB is fully A2A compatible — try sending a message!";
  document.getElementById("psrc").innerHTML='<a href="https://google.github.io/A2A/" target="_blank">A2A Protocol Spec</a> · <a href="https://eips.ethereum.org/EIPS/eip-8004" target="_blank">ERC-8004</a>';
  const pf=document.getElementById("pform");
  pf.innerHTML=`<div class="prow"><label>Agent Endpoint</label><input type="text" id="a2a-ep" value="/api/a2a" placeholder="https://agent-url.com/a2a"></div><div class="prow"><label>Your Message</label><input type="text" id="a2a-msg" placeholder="Hello! What can you do?" onkeydown="if(event.key==='Enter')sendA2A()"></div><button class="run" onclick="sendA2A()">Send Message</button>`;
  pf.style.display="flex";
  out('<pre class="inf">Send a message to BOB! Try asking: "What tools do you have?" or "Tell me about BNB Chain."</pre>');
}
function pickA2A(ep,n){const el=document.getElementById("a2a-ep");if(el)el.value=ep;out(`<pre class="inf">Ready to message ${esc(n)}. Type your message and hit Send!</pre>`)}
async function sendA2A(){
  const ep=document.getElementById("a2a-ep")?.value.trim(),msg=document.getElementById("a2a-msg")?.value.trim()||"Hello!";
  if(!ep){out('<pre class="err">Enter an agent endpoint URL.</pre>');return}
  out('<pre class="inf">Sending message...</pre>');
  try{let r;if(ep.startsWith("/"))r=await fetch(ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({jsonrpc:"2.0",id:1,method:"message/send",params:{message:{parts:[{type:"text",text:msg}]}}})});
  else r=await fetch("/api/a2a-proxy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({endpoint:ep,message:msg})});
  const d=await r.json();if(d.error)pre("Error: "+(d.error.message||d.error),"err");
  else{const txt=d.result?.artifacts?.[0]?.parts?.[0]?.text;pre(txt?"Agent Response:\n\n"+txt:"Response:\n\n"+JSON.stringify(d.result||d,null,2))}
  }catch(e){pre("Connection failed: "+e.message,"err")}
}

renderTabs();renderSidebar();

// Welcome popup (first visit only)
if(!localStorage.getItem("bob-welcomed")){
  const bg=document.createElement("div");bg.className="modal-bg";bg.id="welcome";
  bg.innerHTML=`<div class="modal"><h2><img src="https://raw.githubusercontent.com/mmxrealQQ/bob-assets/main/bob.jpg" alt="BOB">Welcome to BOB Build On BNB</h2><p>The open tool testing platform for BNB Chain AI agents. No wallet, no API key, no setup needed.</p><ul><li><b style="color:var(--g)">Green dot</b> = Live tool — runs real on-chain/API calls right now</li><li><b style="color:var(--t3)">Gray dot</b> = Simulation — shows what the tool does, costs & requirements</li><li><b>116+ tools</b> from 4 MCP servers: on-chain data, Binance markets, DeFi, security & more</li><li><b>A2A Chat</b> — talk to AI agents using Google's Agent-to-Agent protocol</li></ul><p>Pick any tool from the sidebar and hit <b>Run</b> to try it out!</p><button class="mbtn" onclick="closeWelcome()">Let's Go</button><div class="mfoot">Built by BOB on BNB Chain</div></div>`;
  document.body.appendChild(bg);
}
function closeWelcome(){localStorage.setItem("bob-welcomed","1");const el=document.getElementById("welcome");if(el)el.remove()}
